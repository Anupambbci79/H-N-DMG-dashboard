<!DOCTYPE html>
<html>
<head>
  <title>BBCI Head & Neck Oncology Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f8fafc;
      display: flex;
      min-height: 100vh;
      flex-direction: column;
      font-family: Arial, sans-serif;
    }

    .container {
      margin-top: 7vh;
      margin-bottom: 5vh;
    }

    h1 {
      font-weight: 700;
    }

    .intro {
      font-size: 1.2rem;
      color: #374151;
      margin-bottom: 2rem;
    }

    .portal-card {
      background: #ffffff;
      border-radius: 18px;
      padding: 32px 20px;
      box-shadow: 0 8px 28px rgba(15, 23, 42, 0.08);
      border: 1px solid #e5e7eb;
      max-width: 900px;
      margin: 0 auto;
    }

    .btn-lg {
      width: 330px;
      margin: 14px;
      font-size: 1.18rem;
      padding: 14px 18px;
      border-radius: 12px;
      font-weight: 600;
    }

    .btn-academic {
      background: #6f42c1;
      color: #fff;
      border: none;
    }

    .btn-academic:hover {
      background: #563d7c;
      color: #fff;
    }

    .btn-registry {
      background: #143d6b;
      color: #fff;
      border: none;
    }

    .btn-registry:hover {
      background: #0f3157;
      color: #fff;
    }

    .btn-oral {
      background: #0f766e;
      color: #fff;
      border: none;
    }

    .btn-oral:hover {
      background: #115e59;
      color: #fff;
    }

    .footer-note {
      margin-top: 2rem;
      color: #6b7280;
      font-size: 0.95rem;
    }

    @media (max-width: 600px) {
      .container {
        margin-top: 4vh;
      }

      .btn-lg {
        width: 92%;
        font-size: 1.05rem;
        margin: 10px 0;
      }

      .portal-card {
        padding: 24px 12px;
      }
    }
  </style>
</head>

<body>
  <div class="container text-center">

    <div class="portal-card">
      <h1 class="mb-4 text-primary">BBCI Head &amp; Neck Oncology Portal</h1>

      <div class="intro">
        Welcome! Please choose where you'd like to go:
      </div>

      <div>
        <a href="compliance.html" class="btn btn-primary btn-lg">
          Compliance Dashboard
        </a>

        <a href="hns_appointment.html" class="btn btn-success btn-lg">
          OT Appointment Booking
        </a>

        <a href="resident_academics.html" class="btn btn-academic btn-lg">
          Resident Academic Dashboard
        </a>

        <a href="oral-cavity-entry.html" class="btn btn-oral btn-lg">
          Oral Cavity Surgery Registry
        </a>

        <a href="https://script.google.com/macros/s/AKfycbyx46jbIwMsSNp1fNsNCeKr4Z19hlTg6nhEaTuSFbC4xlV0eXCc3fL3IlZnfDC-H3NR/exec" 
           target="_blank" 
           class="btn btn-registry btn-lg">
          H&amp;N Surgery Registry
        </a>
      </div>

      <div class="footer-note">
        BBCI Head &amp; Neck Oncology Digital Tools
      </div>
    </div>

  </div>
</body>
</html>
